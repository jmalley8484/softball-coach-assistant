version: "3.8"

services:
  softball-coach:
    build: .
    container_name: softball-coach
    restart: unless-stopped
    ports:
      - "3080:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/season-phase"]
      interval: 30s
      timeout: 5s
      retries: 3
